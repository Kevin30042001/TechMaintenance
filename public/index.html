<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMaintenance - Sistema de Gestión de Mantenimientos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .logo svg {
            width: 60px;
            height: 60px;
            stroke: #2196F3;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 16px;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 32px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .feature {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .feature h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .feature p {
            font-size: 14px;
            margin: 0;
        }

        footer {
            margin-top: 60px;
            font-size: 14px;
            opacity: 0.8;
        }

        @media screen and (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            p {
                font-size: 16px;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
            </svg>
        </div>

        <h1>TechMaintenance</h1>
        <p>Sistema de Gestión de Mantenimientos Técnicos</p>

        <div class="feature-grid">
            <div class="feature">
                <h3>📱 App Móvil</h3>
                <p>Gestiona mantenimientos desde cualquier lugar</p>
            </div>

            <div class="feature">
                <h3>✅ Validación Web</h3>
                <p>Los clientes validan servicios desde el navegador</p>
            </div>

            <div class="feature">
                <h3>📊 Reportes</h3>
                <p>Estadísticas y análisis detallados</p>
            </div>
        </div>

        <footer>
            TechSolution © 2025 - Todos los derechos reservados
        </footer>
    </div>
</body>
</html>
